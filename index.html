<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benim Radyom</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #121212;
            color: white;
        }
        select, button {
            padding: 15px;
            font-size: 18px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            width: 80%;
            max-width: 300px;
        }
        button {
            background-color: #1DB954;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        button:active { background-color: #14833b; }
        #status { margin-top: 20px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

    <h2>Radyo PWA</h2>

    <select id="stationSelect">
        <option value="http://provisioning.streamtheworld.com/pls/JOY_TURKAAC.pls">Radyo 1 (Test)</option>
        <option value="http://icecast.omroep.nl/radio2-bb-mp3">Radyo 2 (Test)</option>
    </select>

    <button id="playBtn">▶ Başlat</button>
    <div id="status">Hazır</div>

    <script>
        const audio = new Audio();
        const playBtn = document.getElementById('playBtn');
        const stationSelect = document.getElementById('stationSelect');
        const statusText = document.getElementById('status');

        // 1. En son çalınan radyoyu hafızadan yükle
        const savedStation = localStorage.getItem('lastStation');
        if (savedStation) {
            stationSelect.value = savedStation;
        }

        // 2. Oynat / Durdur Mantığı
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.src = stationSelect.value;
                audio.play();
                playBtn.innerText = "⏸ Durdur";
                statusText.innerText = "Canlı Yayın Çalıyor...";
                
                // Seçili radyoyu hafızaya kaydet
                localStorage.setItem('lastStation', stationSelect.value);
                
                // Arka plan kilit ekranı kontrolleri için Media Session API
                setupMediaSession();
            } else {
                audio.pause();
                playBtn.innerText = "▶ Başlat";
                statusText.innerText = "Durduruldu";
            }
        });

        // Radyo değiştiğinde otomatik kaydet ve yeni radyoyu çal
        stationSelect.addEventListener('change', () => {
            localStorage.setItem('lastStation', stationSelect.value);
            if (!audio.paused) {
                audio.src = stationSelect.value;
                audio.play();
                setupMediaSession();
            }
        });

        // Kilit ekranı kontrollerini ayarla
        function setupMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: stationSelect.options[stationSelect.selectedIndex].text,
                    artist: 'Benim Radyom',
                });
                navigator.mediaSession.setActionHandler('play', () => playBtn.click());
                navigator.mediaSession.setActionHandler('pause', () => playBtn.click());
            }
        }

        // Service Worker Kaydı (PWA olabilmesi için şart)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
